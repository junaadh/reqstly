name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-format:
    if: ${{ hashFiles('backend/Cargo.toml') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Cargo fmt
        run: cargo fmt --check

  backend-lint:
    if: ${{ hashFiles('backend/Cargo.toml') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  backend-openapi-contract:
    if: ${{ hashFiles('backend/openapi/openapi.yaml') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OpenAPI parity check
        run: ./scripts/openapi-parity-check.py

  backend-test:
    if: ${{ hashFiles('backend/Cargo.toml') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Backend tests (unit + integration + coverage)
        run: ./scripts/test-backend.sh

  frontend-check:
    if: ${{ hashFiles('frontend/package.json') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build
