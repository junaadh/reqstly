services:
  db:
    ports:
      - "${TEST_DATABASE_PORT:-54323}:${POSTGRES_PORT:-54322}"

  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  migrate:
    container_name: migrate
    image: nxyt/sqlx-cli:v0.70
    platform: linux/amd64
    command: >
      sh -c "
        sqlx database create || true &&
        sqlx migrate run
      "
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    volumes:
      - ../../backend/migrations:/migrations

  backend:
    container_name: backend
    build:
      context: ../../backend
      target: development
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: ${BACKEND_HEALTH_START_PERIOD:-600s}
    environment:
      DATABASE__URL: postgres://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      SERVER__PORT: 3000
      SERVER__BASE_URL: ${API_URL:-https://api.localhost}
      JWT__SECRET: ${JWT_SECRET}
      SUPABASE__URL: ${SUPABASE_PUBLIC_URL}
      CORS__ALLOWED_ORIGIN: ${APP_URL:-https://localhost}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - 3000
    volumes:
      - ../../backend:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/app/target

  caddy:
    container_name: caddy
    image: caddy:2.7-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    depends_on:
      kong:
        condition: service_healthy
      backend:
        condition: service_healthy
    tmpfs:
      - /data
      - /config
    volumes:
      - ../proxy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro

volumes:
  redis-data:
  cargo-registry:
  cargo-git:
  backend-target:
