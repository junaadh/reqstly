name: Deploy

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-backend:main
          cache-from: type=gha,scope=reqstly-backend
          cache-to: type=gha,mode=max,scope=reqstly-backend

  build-frontend-image:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-frontend:main
          cache-from: type=gha,scope=reqstly-frontend
          cache-to: type=gha,mode=max,scope=reqstly-frontend

  deploy-dev:
    name: Deploy Dev
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-backend-image, build-frontend-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy stack to dev VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.API_URL }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_WS_TOKEN_SECRET: ${{ secrets.AUTH_WS_TOKEN_SECRET }}
          AUTH_WS_TOKEN_ISSUER: ${{ secrets.AUTH_WS_TOKEN_ISSUER }}
          AUTH_WEBAUTHN_RP_ID: ${{ secrets.AUTH_WEBAUTHN_RP_ID }}
          AUTH_WEBAUTHN_RP_ORIGIN: ${{ secrets.AUTH_WEBAUTHN_RP_ORIGIN }}
          AUTH_WEBAUTHN_RP_NAME: ${{ secrets.AUTH_WEBAUTHN_RP_NAME }}
          AUTH_SESSION_COOKIE_NAME: ${{ secrets.AUTH_SESSION_COOKIE_NAME }}
          AUTH_SESSION_IDLE_MINUTES: ${{ secrets.AUTH_SESSION_IDLE_MINUTES }}
          AUTH_SESSION_SECURE: ${{ secrets.AUTH_SESSION_SECURE }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          LOGGING_LEVEL: ${{ secrets.LOGGING_LEVEL }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
          BACKEND_IMAGE_TAG: ${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
          FRONTEND_IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "
            set -e

            if [ ! -d ~/reqstly ]; then
              git clone https://github.com/junaadh/reqstly.git ~/reqstly
            fi

            cd ~/reqstly
            git fetch --all
            git reset --hard ${{ github.sha }}

            cat > .env <<ENVVARS
            APP_DOMAIN=${APP_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            APP_URL=${APP_URL}
            API_URL=${API_URL}
            PRIVATE_API_BASE_URL=http://backend:3000
            CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
            CADDY_TLS_CERT_DIR=/home/${DEPLOY_USER}/certs
            CADDY_TLS_CERT_FILE=/certs/reqstly.pem
            CADDY_TLS_KEY_FILE=/certs/reqstly.key
            COMPOSE_PROJECT_NAME=reqstly
            POSTGRES_HOST=db
            POSTGRES_DB=postgres
            POSTGRES_PORT=5432
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            AUTH__WS_TOKEN_SECRET=${AUTH_WS_TOKEN_SECRET}
            AUTH__WS_TOKEN_ISSUER=${AUTH_WS_TOKEN_ISSUER}
            AUTH__SESSION_COOKIE_NAME=${AUTH_SESSION_COOKIE_NAME}
            AUTH__SESSION_IDLE_MINUTES=${AUTH_SESSION_IDLE_MINUTES}
            AUTH__SESSION_SECURE=${AUTH_SESSION_SECURE}
            AUTH__WEBAUTHN_RP_ID=${AUTH_WEBAUTHN_RP_ID}
            AUTH__WEBAUTHN_RP_ORIGIN=${AUTH_WEBAUTHN_RP_ORIGIN}
            AUTH__WEBAUTHN_RP_NAME=${AUTH_WEBAUTHN_RP_NAME}
            SERVER__BASE_URL=${API_URL}
            CORS__ALLOWED_ORIGIN=${APP_URL}
            LOGGING__LEVEL=${LOGGING_LEVEL}
            LOGGING__FORMAT=json
            LOGGING__SERVICE_NAME=reqstly-backend
            LOGGING__ENVIRONMENT=dev
            PUBLIC_API_BASE_URL=${API_URL}
            ORIGIN=${APP_URL}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            BACKEND_IMAGE_TAG=${BACKEND_IMAGE_TAG}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            FRONTEND_IMAGE_TAG=${FRONTEND_IMAGE_TAG}
            ENVVARS
            sed -i 's/^ *//' .env

            docker compose --env-file ~/reqstly/.env -f infra/docker-compose.yml pull backend frontend
            COMPOSE_BUILD=0 ./scripts/up-prod.sh
          "

  deploy-production:
    name: Deploy Production
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: production
    needs: [build-backend-image, build-frontend-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy stack to production VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.API_URL }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_WS_TOKEN_SECRET: ${{ secrets.AUTH_WS_TOKEN_SECRET }}
          AUTH_WS_TOKEN_ISSUER: ${{ secrets.AUTH_WS_TOKEN_ISSUER }}
          AUTH_WEBAUTHN_RP_ID: ${{ secrets.AUTH_WEBAUTHN_RP_ID }}
          AUTH_WEBAUTHN_RP_ORIGIN: ${{ secrets.AUTH_WEBAUTHN_RP_ORIGIN }}
          AUTH_WEBAUTHN_RP_NAME: ${{ secrets.AUTH_WEBAUTHN_RP_NAME }}
          AUTH_SESSION_COOKIE_NAME: ${{ secrets.AUTH_SESSION_COOKIE_NAME }}
          AUTH_SESSION_IDLE_MINUTES: ${{ secrets.AUTH_SESSION_IDLE_MINUTES }}
          AUTH_SESSION_SECURE: ${{ secrets.AUTH_SESSION_SECURE }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          LOGGING_LEVEL: ${{ secrets.LOGGING_LEVEL }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
          BACKEND_IMAGE_TAG: ${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
          FRONTEND_IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "
            set -e

            if [ ! -d ~/reqstly ]; then
              git clone https://github.com/junaadh/reqstly.git ~/reqstly
            fi

            cd ~/reqstly
            git fetch --all
            git reset --hard ${{ github.sha }}

            cat > .env <<ENVVARS
            APP_DOMAIN=${APP_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            APP_URL=${APP_URL}
            API_URL=${API_URL}
            PRIVATE_API_BASE_URL=http://backend:3000
            CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
            CADDY_TLS_CERT_DIR=/home/${DEPLOY_USER}/certs
            CADDY_TLS_CERT_FILE=/certs/reqstly.pem
            CADDY_TLS_KEY_FILE=/certs/reqstly.key
            COMPOSE_PROJECT_NAME=reqstly
            POSTGRES_HOST=db
            POSTGRES_DB=postgres
            POSTGRES_PORT=5432
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            AUTH__WS_TOKEN_SECRET=${AUTH_WS_TOKEN_SECRET}
            AUTH__WS_TOKEN_ISSUER=${AUTH_WS_TOKEN_ISSUER}
            AUTH__SESSION_COOKIE_NAME=${AUTH_SESSION_COOKIE_NAME}
            AUTH__SESSION_IDLE_MINUTES=${AUTH_SESSION_IDLE_MINUTES}
            AUTH__SESSION_SECURE=${AUTH_SESSION_SECURE}
            AUTH__WEBAUTHN_RP_ID=${AUTH_WEBAUTHN_RP_ID}
            AUTH__WEBAUTHN_RP_ORIGIN=${AUTH_WEBAUTHN_RP_ORIGIN}
            AUTH__WEBAUTHN_RP_NAME=${AUTH_WEBAUTHN_RP_NAME}
            SERVER__BASE_URL=${API_URL}
            CORS__ALLOWED_ORIGIN=${APP_URL}
            LOGGING__LEVEL=${LOGGING_LEVEL}
            LOGGING__FORMAT=json
            LOGGING__SERVICE_NAME=reqstly-backend
            LOGGING__ENVIRONMENT=production
            PUBLIC_API_BASE_URL=${API_URL}
            ORIGIN=${APP_URL}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            BACKEND_IMAGE_TAG=${BACKEND_IMAGE_TAG}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            FRONTEND_IMAGE_TAG=${FRONTEND_IMAGE_TAG}
            ENVVARS
            sed -i 's/^ *//' .env

            docker compose --env-file ~/reqstly/.env -f infra/docker-compose.yml pull backend frontend
            COMPOSE_BUILD=0 ./scripts/up-prod.sh
          "
