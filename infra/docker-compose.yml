services:
  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis-data:/data

  migrate:
    container_name: migrate
    image: nxyt/sqlx-cli:v0.70
    platform: linux/amd64
    command: >
      sh -c "
        sqlx database create || true &&
        sqlx migrate run
      "
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: "no"
    volumes:
      - ../../backend/migrations:/migrations

  backend:
    container_name: backend
    image: ${BACKEND_IMAGE:-reqstly-backend}:${BACKEND_IMAGE_TAG:-local}
    build:
      context: ../../backend
      target: runtime
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      DATABASE__URL: postgres://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      SERVER__PORT: 3000
      SERVER__BASE_URL: ${API_URL}
      JWT__SECRET: ${JWT_SECRET}
      SUPABASE__URL: ${SUPABASE_PUBLIC_URL}
      CORS__ALLOWED_ORIGIN: ${APP_URL}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - 3000
    restart: unless-stopped

  caddy:
    container_name: caddy
    image: caddy:2.7-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    depends_on:
      kong:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../proxy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  redis-data:
  caddy-data:
  caddy-config:
