services:
  db:
    container_name: db
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "127.0.0.1:${TEST_DATABASE_PORT:-54323}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  migrate:
    container_name: migrate
    image: nxyt/sqlx-cli:v0.70
    platform: linux/amd64
    command: >
      sh -c "
        sqlx database create --database-url \"$$DATABASE_URL\" || true &&
        sqlx migrate run --database-url \"$$DATABASE_URL\" --source /migrations
      "
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend/migrations:/migrations:ro

  backend:
    container_name: backend
    build:
      context: ../backend
      target: development
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: ${BACKEND_HEALTH_START_PERIOD:-120s}
    environment:
      DATABASE__URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      SERVER__PORT: 3000
      SERVER__BASE_URL: ${API_URL:-https://api.localhost}
      CORS__ALLOWED_ORIGIN: ${APP_URL:-https://localhost}
      AUTH__WS_TOKEN_SECRET: ${AUTH__WS_TOKEN_SECRET:-dev-ws-token-secret}
      AUTH__WS_TOKEN_ISSUER: ${AUTH__WS_TOKEN_ISSUER:-reqstly.local/ws}
      AUTH__SESSION_COOKIE_NAME: ${AUTH__SESSION_COOKIE_NAME:-reqstly_session}
      AUTH__SESSION_IDLE_MINUTES: ${AUTH__SESSION_IDLE_MINUTES:-480}
      AUTH__SESSION_SECURE: ${AUTH__SESSION_SECURE:-false}
      AUTH__WEBAUTHN_RP_ID: ${AUTH__WEBAUTHN_RP_ID:-localhost}
      AUTH__WEBAUTHN_RP_ORIGIN: ${AUTH__WEBAUTHN_RP_ORIGIN:-https://localhost}
      AUTH__WEBAUTHN_RP_NAME: ${AUTH__WEBAUTHN_RP_NAME:-Reqstly}
      LOGGING__LEVEL: ${LOGGING__LEVEL:-reqstly_backend=info,tower_http=info,axum=info}
      LOGGING__FORMAT: ${LOGGING__FORMAT:-json}
      LOGGING__SERVICE_NAME: ${LOGGING__SERVICE_NAME:-reqstly-backend}
      LOGGING__ENVIRONMENT: ${LOGGING__ENVIRONMENT:-dev}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"
    volumes:
      - ../backend:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/app/target

  frontend:
    container_name: frontend
    build:
      context: ../frontend
      target: development
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit((r.status>=200&&r.status<400)?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 45s
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USE_POLLING:-false}"
      CHOKIDAR_INTERVAL: "${CHOKIDAR_INTERVAL:-1000}"
      VITE_USE_POLLING: "${VITE_USE_POLLING:-false}"
      VITE_POLLING_INTERVAL: "${VITE_POLLING_INTERVAL:-1000}"
      ORIGIN: ${APP_URL:-https://localhost}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
      PUBLIC_API_BASE_URL: ${API_URL:-https://api.localhost}
      PRIVATE_API_BASE_URL: ${PRIVATE_API_BASE_URL:-http://backend:3000}
    command: >
      sh -c "bun install --frozen-lockfile && bun run dev:docker"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - 3000
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-bun-cache:/root/.bun/install/cache

  caddy:
    container_name: caddy
    image: caddy:2.7-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    tmpfs:
      - /data
      - /config
    volumes:
      - ./proxy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./proxy/caddy/certs/dev:/etc/caddy/certs/dev:ro

  postgres-exporter:
    container_name: postgres-exporter
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 9187

  redis-exporter:
    container_name: redis-exporter
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - 9121

  loki:
    container_name: loki
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    container_name: promtail
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.53.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_started
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  db-data:
  redis-data:
  cargo-registry:
  cargo-git:
  backend-target:
  frontend-node-modules:
  frontend-bun-cache:
  loki-data:
  prometheus-data:
  grafana-data:
