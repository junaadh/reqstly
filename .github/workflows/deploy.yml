name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-backend:main
          cache-from: type=gha,scope=reqstly-backend
          cache-to: type=gha,mode=max,scope=reqstly-backend

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: build-backend-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy stack to staging VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          SUPABASE_DOMAIN: ${{ secrets.SUPABASE_DOMAIN }}
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_JWT_EXP: ${{ secrets.SUPABASE_JWT_EXP }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URI_ALLOW_LIST: ${{ secrets.SUPABASE_URI_ALLOW_LIST }}
          SUPABASE_MAILER_AUTOCONFIRM: ${{ secrets.SUPABASE_MAILER_AUTOCONFIRM }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          RP_ID: ${{ secrets.RP_ID }}
          ORIGIN: ${{ secrets.ORIGIN }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
          BACKEND_IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "
            set -e

            if [ ! -d ~/reqstly ]; then
              git clone https://github.com/junaadh/reqstly.git ~/reqstly
            fi

            cd ~/reqstly
            git fetch --all
            git reset --hard ${{ github.sha }}

            cat > .env <<ENVVARS
            APP_DOMAIN=${APP_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            SUPABASE_DOMAIN=${SUPABASE_DOMAIN}
            APP_URL=${APP_URL}
            API_URL=${API_URL}
            SUPABASE_PUBLIC_URL=${SUPABASE_URL}
            API_EXTERNAL_URL=${SUPABASE_URL}
            SITE_URL=${APP_URL}
            ADDITIONAL_REDIRECT_URLS=${SUPABASE_URI_ALLOW_LIST}
            CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
            POSTGRES_PASSWORD=${SUPABASE_DB_PASSWORD}
            POSTGRES_HOST=db
            POSTGRES_DB=postgres
            POSTGRES_PORT=5432
            JWT_SECRET=${SUPABASE_JWT_SECRET}
            JWT_EXPIRY=${SUPABASE_JWT_EXP}
            ANON_KEY=${SUPABASE_ANON_KEY}
            SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            DASHBOARD_USERNAME=supabase
            DASHBOARD_PASSWORD=${SUPABASE_DB_PASSWORD}
            SECRET_KEY_BASE=${SUPABASE_JWT_SECRET}
            VAULT_ENC_KEY=${SUPABASE_JWT_SECRET}
            PG_META_CRYPTO_KEY=${SUPABASE_JWT_SECRET}
            LOGFLARE_PUBLIC_ACCESS_TOKEN=${SUPABASE_JWT_SECRET}
            LOGFLARE_PRIVATE_ACCESS_TOKEN=${SUPABASE_JWT_SECRET}
            S3_PROTOCOL_ACCESS_KEY_ID=${SUPABASE_DB_PASSWORD}
            S3_PROTOCOL_ACCESS_KEY_SECRET=${SUPABASE_DB_PASSWORD}
            POOLER_PROXY_PORT_TRANSACTION=6543
            POOLER_DEFAULT_POOL_SIZE=20
            POOLER_MAX_CLIENT_CONN=100
            POOLER_TENANT_ID=reqstly
            POOLER_DB_POOL_SIZE=5
            STUDIO_DEFAULT_ORGANIZATION=Reqstly
            STUDIO_DEFAULT_PROJECT=Reqstly
            OPENAI_API_KEY=
            DISABLE_SIGNUP=false
            MAILER_URLPATHS_CONFIRMATION=/auth/v1/verify
            MAILER_URLPATHS_INVITE=/auth/v1/verify
            MAILER_URLPATHS_RECOVERY=/auth/v1/verify
            MAILER_URLPATHS_EMAIL_CHANGE=/auth/v1/verify
            ENABLE_EMAIL_SIGNUP=true
            ENABLE_EMAIL_AUTOCONFIRM=${SUPABASE_MAILER_AUTOCONFIRM}
            SMTP_ADMIN_EMAIL=admin@example.com
            SMTP_HOST=supabase-mail
            SMTP_PORT=2500
            SMTP_USER=fake_mail_user
            SMTP_PASS=fake_mail_password
            SMTP_SENDER_NAME=reqstly
            ENABLE_ANONYMOUS_USERS=false
            ENABLE_PHONE_SIGNUP=true
            ENABLE_PHONE_AUTOCONFIRM=true
            GLOBAL_S3_BUCKET=stub
            REGION=stub
            MINIO_ROOT_USER=supa-storage
            MINIO_ROOT_PASSWORD=${SUPABASE_DB_PASSWORD}
            STORAGE_TENANT_ID=stub
            FUNCTIONS_VERIFY_JWT=false
            PGRST_DB_SCHEMAS=public,storage,graphql_public
            DOCKER_SOCKET_LOCATION=/var/run/docker.sock
            GOOGLE_PROJECT_ID=GOOGLE_PROJECT_ID
            GOOGLE_PROJECT_NUMBER=GOOGLE_PROJECT_NUMBER
            KONG_HTTP_PORT=8000
            KONG_HTTPS_PORT=8443
            IMGPROXY_ENABLE_WEBP_DETECTION=true
            PROXY_DOMAIN=${SUPABASE_DOMAIN}
            CERTBOT_EMAIL=${CADDY_ACME_EMAIL}
            COMPOSE_PROJECT_NAME=reqstly
            RP_ID=${RP_ID}
            ORIGIN=${ORIGIN}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            BACKEND_IMAGE_TAG=${BACKEND_IMAGE_TAG}
            ENVVARS
            sed -i 's/^ *//' .env

            docker compose --env-file ~/reqstly/.env -f infra/supabase/docker-compose.yml -f infra/docker-compose.yml pull backend
            COMPOSE_BUILD=0 ./scripts/up-prod.sh
          "

  smoke-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        env:
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.API_URL }}
          SUPABASE_PUBLIC_URL: ${{ secrets.SUPABASE_URL }}
        run: ./scripts/smoke-check.sh

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    needs: smoke-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy stack to production VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          SUPABASE_DOMAIN: ${{ secrets.SUPABASE_DOMAIN }}
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_JWT_EXP: ${{ secrets.SUPABASE_JWT_EXP }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URI_ALLOW_LIST: ${{ secrets.SUPABASE_URI_ALLOW_LIST }}
          SUPABASE_MAILER_AUTOCONFIRM: ${{ secrets.SUPABASE_MAILER_AUTOCONFIRM }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          RP_ID: ${{ secrets.RP_ID }}
          ORIGIN: ${{ secrets.ORIGIN }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
          BACKEND_IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "
            set -e

            if [ ! -d ~/reqstly ]; then
              git clone https://github.com/junaadh/reqstly.git ~/reqstly
            fi

            cd ~/reqstly
            git fetch --all
            git reset --hard ${{ github.sha }}

            cat > .env <<ENVVARS
            APP_DOMAIN=${APP_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            SUPABASE_DOMAIN=${SUPABASE_DOMAIN}
            APP_URL=${APP_URL}
            API_URL=${API_URL}
            SUPABASE_PUBLIC_URL=${SUPABASE_URL}
            API_EXTERNAL_URL=${SUPABASE_URL}
            SITE_URL=${APP_URL}
            ADDITIONAL_REDIRECT_URLS=${SUPABASE_URI_ALLOW_LIST}
            CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
            POSTGRES_PASSWORD=${SUPABASE_DB_PASSWORD}
            POSTGRES_HOST=db
