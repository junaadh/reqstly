services:
  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis-data:/data

  migrate:
    container_name: migrate
    image: nxyt/sqlx-cli:v0.70
    platform: linux/amd64
    command: >
      sh -c "
        sqlx database create || true &&
        sqlx migrate run
      "
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: "no"
    volumes:
      - ../../backend/migrations:/migrations

  backend:
    container_name: backend
    image: ${BACKEND_IMAGE:-reqstly-backend}:${BACKEND_IMAGE_TAG:-local}
    build:
      context: ../../backend
      target: runtime
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      DATABASE__URL: postgres://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      SERVER__PORT: 3000
      SERVER__BASE_URL: ${API_URL}
      JWT__SECRET: ${JWT_SECRET}
      SUPABASE__URL: ${SUPABASE_PUBLIC_URL}
      CORS__ALLOWED_ORIGIN: ${APP_URL}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - 3000
    restart: unless-stopped

  frontend:
    container_name: frontend
    image: ${FRONTEND_IMAGE:-reqstly-frontend}:${FRONTEND_IMAGE_TAG:-local}
    build:
      context: ../../frontend
      target: runtime
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${APP_URL}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
      PUBLIC_API_BASE_URL: ${API_URL}
      PRIVATE_API_BASE_URL: ${PRIVATE_API_BASE_URL:-http://backend:3000}
      PRIVATE_SUPABASE_URL: ${PRIVATE_SUPABASE_URL:-http://kong:8000}
      PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_AUTH_JWT_ISSUER: ${SUPABASE_PUBLIC_URL}/auth/v1
    depends_on:
      backend:
        condition: service_healthy
      kong:
        condition: service_healthy
    expose:
      - 3000
    restart: unless-stopped

  caddy:
    container_name: caddy
    image: caddy:2.7-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    depends_on:
      kong:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../proxy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  postgres-exporter:
    container_name: postgres-exporter
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 9187
    restart: unless-stopped

  redis-exporter:
    container_name: redis-exporter
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - 9121
    restart: unless-stopped

  loki:
    container_name: loki
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    container_name: promtail
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.53.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_started
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
  loki-data:
  prometheus-data:
  grafana-data:
